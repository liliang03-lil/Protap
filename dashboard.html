<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProTap — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --dark: #0d1621;
      --dark2: #15202e;
      --dark3: #1c2b3a;
      --text: #F0EDE6;
      --text-muted: #8A8478;
      --border: rgba(201,168,76,0.18);
      --green: #4CAF7D;
    }
    html, body { min-height: 100vh; background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
    body { background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 70%), var(--dark); }

    /* Header */
    .header { padding: 32px 24px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .logo-wrap { display: flex; align-items: center; gap: 8px; }
    .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--text); }
    .logo-text span { color: var(--gold); }
    .logo-badge { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--border); padding: 3px 8px; border-radius: 100px; }
    .header-right { text-align: right; }
    .header-name { font-size: 13px; color: var(--text); }
    .header-role { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }

    /* Main */
    .main { max-width: 900px; margin: 0 auto; padding: 24px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
    .stat-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--gold); line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

    /* Section title */
    .section-title { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; opacity: 0.8; }

    /* Search */
    .search-wrap { margin-bottom: 16px; }
    .search-input { width: 100%; padding: 12px 16px; background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; outline: none; transition: border-color 0.2s; }
    .search-input::placeholder { color: var(--text-muted); opacity: 0.6; }
    .search-input:focus { border-color: rgba(201,168,76,0.4); }

    /* Table */
    .table-wrap { background: var(--dark2); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .table { width: 100%; border-collapse: collapse; }
    .table th { padding: 14px 16px; text-align: left; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 400; }
    .table td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid rgba(201,168,76,0.06); color: var(--text); }
    .table tr:last-child td { border-bottom: none; }
    .table tr:hover td { background: rgba(255,255,255,0.02); }

    .badge-new { display: inline-block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.2); padding: 2px 8px; border-radius: 100px; }

    /* Empty state */
    .empty { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
    .empty p { font-size: 13px; }

    /* Loading */
    .loading { text-align: center; padding: 48px; color: var(--text-muted); font-size: 13px; }

    /* Refresh btn */
    .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: transparent; border: 1px solid var(--border); border-radius: 10px; color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-bottom: 16px; }
    .refresh-btn:hover { background: rgba(201,168,76,0.06); }

    /* Mobile */
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .table th:nth-child(3), .table td:nth-child(3) { display: none; }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <span class="logo-text"><span>Fidele</span>MC</span>
    <span class="logo-badge">Dashboard</span>
  </div>
  <div class="header-right">
    <div class="header-name">Lilian Giteau</div>
    <div class="header-role">Fondateur</div>
  </div>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-label">Total Prospects</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub">depuis le debut</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cette semaine</div>
      <div class="stat-value" id="statWeek">—</div>
      <div class="stat-sub">7 derniers jours</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ce mois</div>
      <div class="stat-value" id="statMonth">—</div>
      <div class="stat-sub">30 derniers jours</div>
    </div>
  </div>

  <!-- Prospects list -->
  <div class="section-title">Prospects</div>

  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="Rechercher un prospect..." oninput="filterProspects()">
  </div>

  <button class="refresh-btn" onclick="loadData()">
    ↻ Actualiser
  </button>

  <div class="table-wrap" id="tableWrap">
    <div class="loading">Chargement des donnees...</div>
  </div>

</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw3sDPNETa1UDybHNx-WyVZ2zxb-7arKpJhCKpIns1tfUdeeFT2SHqc2WpHQ4qQvu2i2w/exec';
var allProspects = [];

function loadData() {
  document.getElementById('tableWrap').innerHTML = '<div class="loading">Chargement des donnees...</div>';
  var img = new Image();
  var url = SCRIPT_URL + '?action=get&t=' + Date.now();
  
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status === 'success') {
        allProspects = data.data.reverse();
        updateStats(allProspects);
        renderTable(allProspects);
      }
    })
    .catch(function() {
      document.getElementById('tableWrap').innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><p>Impossible de charger les donnees.<br>Verifiez votre connexion.</p></div>';
    });
}

function updateStats(prospects) {
  var now = new Date();
  var weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
  var monthAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);

  var thisWeek = prospects.filter(function(p) { return new Date(p.date) > weekAgo; }).length;
  var thisMonth = prospects.filter(function(p) { return new Date(p.date) > monthAgo; }).length;

  document.getElementById('statTotal').textContent = prospects.length;
  document.getElementById('statWeek').textContent = thisWeek;
  document.getElementById('statMonth').textContent = thisMonth;
}

function renderTable(prospects) {
  if (prospects.length === 0) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty"><div class="empty-icon">◇</div><p>Aucun prospect pour l\'instant.<br>Partagez votre carte NFC !</p></div>';
    return;
  }

  var now = new Date();
  var weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);

  var rows = prospects.map(function(p) {
    var date = new Date(p.date);
    var dateStr = date.toLocaleDateString('fr-FR', {day: '2-digit', month: '2-digit', year: 'numeric'});
    var isNew = date > weekAgo;
    return '<tr>'
      + '<td>' + (p.nom || '—') + (isNew ? ' <span class="badge-new">Nouveau</span>' : '') + '</td>'
      + '<td>' + (p.telephone || '—') + '</td>'
      + '<td>' + (p.email || '—') + '</td>'
      + '<td>' + dateStr + '</td>'
      + '</tr>';
  }).join('');

  document.getElementById('tableWrap').innerHTML = '<table class="table">'
    + '<thead><tr><th>Nom</th><th>Telephone</th><th>Email</th><th>Date</th></tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table>';
}

function filterProspects() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var filtered = allProspects.filter(function(p) {
    return (p.nom || '').toLowerCase().includes(search)
      || (p.email || '').toLowerCase().includes(search)
      || (p.telephone || '').includes(search);
  });
  renderTable(filtered);
}

loadData();
</script>
</body>
</html>
